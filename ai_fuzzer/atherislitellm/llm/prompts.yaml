codegemma_3:
  <<: *defaults
  temperature: 0.25
  description: >
    Trying to make Code Gemma Templates work
  template: |
    <start_of_turn>user
    You are a senior security engineer. Write a structure-aware Atheris fuzzing harness utilizing a Custom Mutator for the provided parser logic.

    ### LOGICAL REQUIREMENTS:
    1. **Custom Mutator Definition**: Define a function `CustomMutator(data, max_size, seed)` that handles the structural manipulation of the input format (e.g., decompression, structural decoding).
    2. **Mutation Mechanics**: Within the custom mutator, safely attempt to decode the incoming `data`. Apply a structural mutation, then re-encode it before returning the byte array. Use standard `atheris.Mutate(data, max_size)` to apply baseline bit-flips to the decoded payload.
    3. **Fallback Logic**: If the initial data fails to decode within the mutator, return a valid, hardcoded structural seed to establish a baseline for subsequent mutations.
    4. **Target Execution**: Define `TestOneInput(data: bytes)` to execute the target parser against the mutated payload, wrapping it in a `try...except` block to ignore expected parsing exceptions.
    5. **Orchestration**: Initialize the custom mutator sequence using `atheris.MutateAndTestOneInput`.

    ### EXAMPLE: ZLIB CUSTOM MUTATOR IMPLEMENTATION
    ```python
    import sys
    import atheris

    with atheris.instrument_imports():
        import zlib
        from target_parser import parse_compressed_payload

    def CustomMutator(data, max_size, seed):
        try:
            # Attempt to structurally decompress the incoming fuzzer data
            decompressed = zlib.decompress(data)
        except zlib.error:
            # Establish a valid baseline structural seed if decompression fails
            decompressed = b'ValidInitialSeedState'

        # Apply baseline mutational chaos to the exposed structural core
        mutated_core = atheris.Mutate(decompressed, len(decompressed))

        # Re-encode the structure to bypass the target's initial decompression check
        return zlib.compress(mutated_core)

    def TestOneInput(data: bytes):
        try:
            parse_compressed_payload(data)
        except (zlib.error, ValueError):
            pass

    if __name__ == "__main__":
        # Crucial: Register the custom mutator to intercept the libFuzzer loop
        atheris.Setup(sys.argv, atheris.MutateAndTestOneInput, custom_mutator=CustomMutator)
        atheris.Fuzz()
    TARGET PARSER CODE
    {INSERT_COMPRESSOR_OR_PARSER_SOURCE_CODE_HERE}

    Synthesize the structure-aware Atheris fuzzing harness featuring a custom mutator tailored exactly to the grammatical requirements of the target code.<end_of_turn>
    <start_of_turn>model
